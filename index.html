<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teras Sultan - Registrasi Grand Opening</title>
    <meta name="description" content="RSVP Grand Opening Teras Sultan Arabian Modern Restaurant.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <main class="container">
        <div class="glass-card" id="registration-card">
            <header class="header">
                <img src="Yogya-03.png" alt="Logo Teras Sultan" class="logo-image">
                <h1 class="restaurant-name">Teras Sultan</h1>
                <p class="subtitle">Arabian Modern Restaurant</p>
                <div class="badge" style="display:inline-block; margin-top:10px; padding: 4px 12px; background: rgba(212,175,55,0.15); color: var(--gold); border: 1px solid var(--card-border); border-radius: 20px; font-size: 0.8rem; font-weight: 600; letter-spacing: 1px;">GRAND OPENING</div>
            </header>

            <form id="registration-form" class="form">
                <div class="form-header">
                    <h2>RSVP Kehadiran</h2>
                    <p>Mohon isi data Anda untuk konfirmasi kehadiran di acara Grand Opening kami.</p>
                </div>

                <div class="input-group">
                    <input type="text" id="name" name="name" required placeholder=" ">
                    <label for="name">Nama Lengkap</label>
                </div>

                <div class="input-group">
                    <input type="email" id="email" name="email" required placeholder=" ">
                    <label for="email">Alamat Email</label>
                </div>

                <div class="input-group">
                    <input type="tel" id="phone" name="phone" required placeholder=" ">
                    <label for="phone">Nomor WhatsApp</label>
                </div>

                <button type="submit" class="submit-btn">
                    <span>Daftar Sekarang</span>
                    <svg class="arrow-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </form>
        </div>

        <div class="glass-card success-card hidden" id="success-card">
            <div class="success-icon">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </div>
            <h2>Terima Kasih!</h2>
            <p>RSVP Anda telah berhasil disimpan. Terima kasih dan selamat menikmati Grand Opening Teras Sultan.</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
