<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terasultan - Registrasi Sederhana</title>
    <meta name="description" content="RSVP Terasultan Arabian Modern Restaurant.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <main class="container">
        <div class="glass-card" id="registration-card">
            <header class="header">
                <img src="Yogya-03.png" alt="Logo Terasultan" class="logo-image">
                <p class="tagline">MIDDLE EAST FOOD, AMBIENCE<br>& ENTERTAINMENT EXPERIENCE</p>
            </header>

            <form id="registration-form" class="form" novalidate>
                <div class="form-header">
                    <h2>Guest Registration</h2>
                    <p>Please complete your details below.</p>
                </div>

                <div class="input-group mt-3">
                    <input type="text" id="name" name="name" required placeholder=" ">
                    <label for="name">Full Name</label>
                </div>

                <div class="input-group">
                    <input type="email" id="email" name="email" required placeholder=" ">
                    <label for="email">Email Address</label>
                </div>

                <div class="input-group">
                    <input type="tel" id="phone" name="phone" required placeholder=" ">
                    <label for="phone">WhatsApp Number</label>
                </div>

                <div id="error-message" class="error-message hidden"></div>
                <button type="submit" class="submit-btn mt-3">
                    <span>Complete Registration</span>
                    <svg class="arrow-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </form>
        </div>

        <div class="glass-card success-card hidden" id="success-card">
            <div class="success-icon">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </div>
            <h2>Terima Kasih!</h2>
            <p>RSVP Anda telah berhasil disimpan. Terima kasih dan selamat menikmati Grand Opening Terasultan.</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
